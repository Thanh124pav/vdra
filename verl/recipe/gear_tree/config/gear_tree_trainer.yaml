# GEAR/Tree recipe config. Composes verl's ppo_trainer base, then switches the
# policy loss to the treetune-faithful `treetune_ppo` and adds the custom
# `gear_tree` block consumed by the rollout worker (tree shape, M, GEAR params).
#
# Launch:
#   python -m recipe.gear_tree.main_gear_tree \
#     --config-path recipe/gear_tree/config --config-name gear_tree_trainer \
#     actor_rollout_ref.model.path=<hf_model> data.train_files=... data.val_files=...

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

# --- custom block read by GearTreeActorRolloutWorker.init_model --------------
gear_tree:

  # Rollout backend: async (verl>=0.7 + vLLM>=0.20, agent-loop) | spmd (verl 0.6).
  rollout_backend: async

  # Branch factor per depth (SPO tree shape). Chain = [1,1,...]; tree = [6,6,6].
  tree_shape: [6, 6, 6]

  # Segment length M (tokens per non-terminal segment). None at the last depth.
  segment_length: 100

  # Advantage variant: spo | treepo_original | treerl_original.
  tree_update_mode: spo

  # Local advantage baseline: rloo (child-parent) | grpo (normalized).
  adv_method: rloo

  # TreePO global-advantage mixing weight (only used by treepo_original).
  treepo_global_weight: 0.5

  # TreeRL discount (only used by treerl_original).
  treerl_gamma: 0.9

  # Drop edges whose pav_advantage == 0 (treetune default).
  only_adv_greater_than_zero: true

  # GEAR-VinePPO: K MC rollouts per cut-point for value estimation (0 = off,
  # use SPO/TreeRL/TreePO tree values instead).
  vineppo_K: 0

  # Penalty for length-truncated MC rollouts (VinePPO unfinished penalty).
  unfinished_penalty: 0.0

  # MATH grading knobs (treetune MATHRewardFunction / MATH task).
  answer_prefix: "# Answer\n"

  use_minerva_few_shot_prompt: false

  # --- offline logging (treetune-style) -------------------------------------
  # demos.jsonl / demos.md + full-tree examples. null => <default_local_dir>/gear_demos.
  demos_dir: null

  # SHARE/PRUNE/budget demo rows dumped per tree (0 = stats only).
  demo_examples_per_tree: 4

  # Dump one COMPLETE example tree every N trees (0 = never), capped at max.
  full_tree_every_n_trees: 25

  full_tree_max_trees: 5

  # GEAR online gate (prefix GEAR-* algorithms). Disabled => plain SPO/TreeRL/TreePO.
  gear:

    enabled: true

    epsilon: 0.02

    r_max: 1.0

    gamma: 0.9

    alpha: 0.05

    # simple (perplexity k-predictor) | budget_allocation (VDRA: pilot TV ->
    # dispersion bound C_s -> k_s ~ sqrt(C_s) with n_min floor; needs scorer).
    k_algorithm: budget_allocation

    # Allocation floor k_min (Summary.md §10): every queued node keeps at
    # least n_min branches so an inaccurate proxy cannot fully discard it.
    n_min: 1


    # k0 pilot children and r likelihood samples per child.
    pilot_branch_factor: null
    likelihood_samples_per_distribution: 2

    # Estimate root dispersion bounds and allocate depth-0 budget across the
    # minibatch's roots before building each tree.
    root_allocation: false

    skip_near_leaf_expand: true

    enable_share: false

    # --- VDRA scoring / bound knobs ----------------------------------------
    # Tail-divergence correction (Summary.md §7): D_L <= D_m + (1-D_m)*eps_tail.
    # Calibrate with scripts/calibrate_tail_divergence.py (RQ3).
    eps_tail: 0.1
    eps_tail_calibration_path: null

    # Optional depth-indexed override, e.g. {0: 0.3, 2: 0.15}. null => global.
    eps_tail_by_depth: null

    # 'linear' (|dV| <= r_max * TV, exact for terminal bounded reward) |
    # 'simulation_lemma' (legacy discounted form, clamped to r_max).
    bound_form: linear

    # 'tanh' (Summary.md §9 likelihood-ratio estimator) | 'legacy_abs' (ablation).
    tv_estimator: tanh

    # Short-continuation lengths: first phase = pilot segment, second = scored block (m).
    tv_first_phase_tokens: 120

    tv_second_phase_tokens: 60

    # Online queues flush on capacity or timeout; final drain only at rollout end.
    queue_count: 1
    queue_capacity: 8

    queue_timeout_seconds: 0.0

    # Share unused floor budget across queues via the reserve pool.
    use_residual_budget: true

    # Main method fails instead of changing algorithms or supports silently.
    strict_vdra: true
    invalid_support_policy: error
    budget_mode: fixed_main
    allocation_proxy: vdra

    # OpenAI-compatible vLLM endpoint used to score log pi(y|prefix) for the
    # VDRA likelihood scoring. Missing endpoint is a startup error in strict mode.
    scorer_api_base: http://127.0.0.1:8000/v1

    scorer_model: ""

    scorer_max_concurrency: 64

# --- overrides on the verl base ---------------------------------------------
algorithm:

  # Advantage is computed in the tree rollout, so verl's estimator is bypassed
  # by RayGearTreeTrainer. Kept as gae to satisfy config validation.
  adv_estimator: gae

  # KL coefficient = 0 by default (no KL in reward).
  use_kl_in_reward: false

  kl_ctrl:

    kl_coef: 0.0

actor_rollout_ref:

  actor:

    # treetune-faithful PPO-clip loss (prob-mask, +-10 clamp, ratio-threshold).
    policy_loss:

      loss_mode: treetune_ppo

    # No KL-in-loss by default (matches tree-family configs). KL coef = 0.
    use_kl_loss: false

    kl_loss_coef: 0.0

    entropy_coeff: 0.0

    clip_ratio: 0.2

    ppo_epochs: 1

  rollout:

    name: vllm

    # Async server + agent-loop (verl>=0.7). Tree segments are generated by the
    # gear_tree_agent via repeated server_manager.generate calls.
    mode: async

    # Per-token logprobs needed by the GEAR gate.
    calculate_log_probs: true

    agent:

      # The registered TreeAgentLoop that builds the SPO/GEAR tree per prompt.
      default_agent_loop: gear_tree_agent

      # Maps gear_tree_agent -> recipe.gear_tree.async_tree_rollout.TreeAgentLoop
      # so the agent-loop workers can instantiate it by fqdn.
      agent_loop_config_path: recipe/gear_tree/config/agent_loop.yaml

# Validation grading uses the vendored MATH grader.
custom_reward_function:

  path: recipe/gear_tree/reward.py

  name: compute_gear_math_score

reward_model:

  reward_manager: gear_math
