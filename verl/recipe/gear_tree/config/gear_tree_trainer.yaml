# GEAR/Tree recipe config. Composes verl's ppo_trainer base, then switches the
# policy loss to the treetune-faithful `treetune_ppo` and adds the custom
# `gear_tree` block consumed by the rollout worker (tree shape, M, GEAR params).
#
# Launch:
#   python -m recipe.gear_tree.main_gear_tree \
#     --config-path recipe/gear_tree/config --config-name gear_tree_trainer \
#     actor_rollout_ref.model.path=<hf_model> data.train_files=... data.val_files=...

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

# --- custom block read by GearTreeActorRolloutWorker.init_model --------------
gear_tree:

  # Rollout backend: async (verl>=0.7 + vLLM>=0.20, agent-loop) | spmd (verl 0.6).
  rollout_backend: async

  # Branch factor per depth (SPO tree shape). Chain = [1,1,...]; tree = [6,6,6].
  tree_shape: [6, 6, 6]

  # Segment length M (tokens per non-terminal segment). None at the last depth.
  segment_length: 100

  # Advantage variant. treepo_style_ablation / treerl_style_ablation are
  # scalar-objective ablations, NOT byte-faithful reproductions of the
  # official TreePO / TreeRL algorithms — the `_original` names have been
  # renamed to reflect this (see PLAN.md P0.N3). The old ``treepo_original``
  # and ``treerl_original`` strings are still accepted as deprecated aliases
  # for vendor parity, but must not appear in main VDRA configs.
  # Main VDRA runs use `spo`.
  # Values: spo | treepo_style_ablation | treerl_style_ablation.
  tree_update_mode: spo

  # Local advantage baseline: rloo (child-parent) | grpo (normalized).
  adv_method: rloo

  # TreePO-style global-advantage mixing weight (only used by treepo_style_ablation).
  treepo_global_weight: 0.5

  # TreeRL-style discount (only used by treerl_style_ablation).
  treerl_gamma: 0.9

  # PLAN.md P0.1: main VDRA runs keep every realized child, including
  # zero-advantage ones, so the parent denominator (|children_of_p|) matches
  # allocated_k. Legacy treetune default was true (drop pav_advantage == 0);
  # keep that option for the SPO baseline only.
  only_adv_greater_than_zero: false

  replay_buffer:
    enabled: true
    # PLAN.md P0.2 canonical names. The old aliases
    # (target_edges_per_update / max_edges_per_question / max_edge_age)
    # remain accepted for one release but must not appear in main configs.
    target_edges_per_iteration: 512
    max_edge_age_iterations: 8
    # 'auto' resolves to ceil(R * (sum_d prod_{l<=d} b_l) / max_edge_age_iterations)
    # from `tree_shape` and `actor_rollout_ref.rollout.n`. Numeric overrides
    # are legal only for controlled compatibility/ablation runs.
    max_edges_per_question_per_iteration: auto
    replay_sampling_unit: edge
    underfill_policy: use_available
    underfilled_update_policy: postpone_until_divisible
    sampling_seed: 0
    checkpoint: true

  # GEAR-VinePPO: K MC rollouts per cut-point for value estimation (0 = off,
  # use SPO/TreeRL/TreePO tree values instead).
  vineppo_K: 0

  # Penalty for length-truncated MC rollouts (VinePPO unfinished penalty).
  unfinished_penalty: 0.0

  # MATH grading knobs (treetune MATHRewardFunction / MATH task).
  answer_prefix: "# Answer\n"

  use_minerva_few_shot_prompt: false

  # --- offline logging (treetune-style) -------------------------------------
  # demos.jsonl / demos.md + full-tree examples. null => <default_local_dir>/gear_demos.
  demos_dir: null

  # SHARE/PRUNE/budget demo rows dumped per tree (0 = stats only).
  demo_examples_per_tree: 4

  # Dump one COMPLETE example tree every N trees (0 = never), capped at max.
  full_tree_every_n_trees: 25

  full_tree_max_trees: 5

  # GEAR online gate (prefix GEAR-* algorithms). Disabled => plain SPO/TreeRL/TreePO.
  gear:

    enabled: true

    epsilon: 0.02

    r_max: 1.0

    gamma: 0.9

    alpha: 0.05

    # simple (perplexity k-predictor) | budget_allocation (VDRA: pilot TV ->
    # dispersion bound C_s -> k_s ~ sqrt(C_s) with n_min floor; needs scorer).
    k_algorithm: budget_allocation

    # Allocation floor k_min (Summary.md §10): every queued node keeps at
    # least n_min branches so an inaccurate proxy cannot fully discard it.
    n_min: 1


    # k0 pilot children and r likelihood samples per child.
    pilot_branch_factor: 8
    likelihood_samples_per_distribution: 2

    # Current verl runtime owns one queue manager per tree; do not claim
    # cross-root minibatch allocation until that shared context is implemented.
    root_allocation: false
    # P1.3 canonical value: runtime solver acts per queue flush within one tree
    # (see PLAN.md §2.1).
    allocation_scope: per_queue_flush_within_tree

    skip_near_leaf_expand: true

    enable_share: false

    # --- VDRA scoring / bound knobs ----------------------------------------
    # tail_mode: none uses short-horizon divergence as a relative allocation
    # proxy and intentionally permits strict_vdra with eps_tail=0 and no
    # calibration artifact. Use calibrated only when a tail-calibration file is
    # available; fixed is an explicit ablation-style numeric correction.
    tail_mode: none
    eps_tail: 0.0
    eps_tail_calibration_path: null

    # Optional depth-indexed override for calibrated/fixed modes. null => global.
    eps_tail_by_depth: null

    # P1.9: main run is `linear` (|dV| <= r_max * TV, exact for terminal
    # bounded reward). `simulation_lemma` is a legacy discounted formulation
    # that is NOT paper-safe under `tail_mode: none` — treat it as a
    # quarantined ablation, do not use it for main comparison runs.
    bound_form: linear

    # 'tanh' (Summary.md §9 likelihood-ratio estimator) | 'legacy_abs' (ablation).
    tv_estimator: tanh

    # Short-continuation lengths: first phase = pilot segment, second = scored block (m).
    tv_first_phase_tokens: 60

    tv_second_phase_tokens: 60

    # online_timeout (main) | depth_batch (legacy ablation).
    allocation_runtime: online_timeout

    # Online queues flush on capacity or timeout; final drain only at rollout end.
    queue_count: 4
    queue_capacity: 8

    queue_timeout_seconds: 1.0

    # Integer rounding of the capped continuous allocation (ablation #10):
    # Default exact bounded marginal integer solver.
    rounding_strategy: integer_marginal
    rounding_seed: 0

    # Share unused floor budget across queues via the reserve pool.
    use_residual_budget: true

    # Pilot execution mode. fresh_iid is the theory-safe main-paper path:
    # pilots/support estimate allocation only, then final children are freshly
    # sampled iid. weighted_reuse is the compute-efficient reuse variant.
    pilot_execution_mode: fresh_iid
    weighted_reuse_fallback: fresh_iid
    representative_weight_mode: cluster_multiplicity
    terminal_pilot_handling: include_in_dispersion

    # Main method fails instead of changing algorithms or supports silently.
    strict_vdra: true
    invalid_support_policy: error

    # fixed_main: fixed main-expansion branch budget, pilot/scoring reported
    # as overhead. uniform_full_tree_token_cap: pilot + support + main
    # generation share one maximum-style cap derived from the uniform full tree.
    # fixed_total_generated remains accepted as a legacy alias.
    budget_mode: fixed_main

    # Strict VDRA assumes scorer likelihoods match rollout distribution. The
    # auditable main path uses the unwarped policy distribution.
    rollout_temperature: 1.0
    rollout_top_p: 1.0

    # vdra | uniform | random | direct_tv | empirical_variance |
    # external_score | oracle (oracle = evaluation-only, flagged in manifest).
    allocation_proxy: vdra

    # Full rollouts per node for allocation_proxy: oracle.
    oracle_rollouts_per_node: 16

    # Import path "module:callable" for allocation_proxy: external_score.
    external_score_module: null

    # PLAN.md P0.5/P0.6: rollout/scorer weight verification requires exactly
    # one of the following two explicit modes:
    #   (A) scorer_uses_rollout_server: true — the scorer replays log-probs
    #       through the SAME vLLM server the rollout uses; one verified
    #       weight version is sufficient.
    #   (B) rollout_api_base + scorer_api_base — two independent endpoints;
    #       the trainer fetches server-reported versions from each and fails
    #       (strict_vdra) when they are missing or mismatched.
    # Do NOT silently fall back from A to B.
    # Canonical smoke uses mode (A): scorer piggybacks on the rollout server
    # so `pre_gpu_check.sh` and CPU CI can resolve one valid topology.
    scorer_uses_rollout_server: true
    # Rollout endpoint used by the trainer to fetch the rollout replica's
    # weight version. Must be null in mode (A); required in mode (B).
    rollout_api_base: null
    # OpenAI-compatible vLLM endpoint used to score log pi(y|prefix) for the
    # VDRA likelihood scoring. In mode (A) this is also the rollout server.
    # Missing endpoint is a startup error in strict mode.
    scorer_api_base: http://127.0.0.1:8000/v1

    # Empty => query <scorer_api_base>/models at startup and fail clearly if no served id is available.
    scorer_model: ""

    scorer_max_concurrency: 64

# --- VDRA tree-policy contract (PLAN.md P0.1 / P0.4 / P0.6) -----------------
tree_policy:
  # advantage_mode selects HOW child advantages are computed inside
  # extract_edges_from_tree. Main VDRA is `spo_local` (== gear_tree.tree_update_mode=spo).
  # Values: spo_local | configured_ablation.
  advantage_mode: spo_local

  # policy_aggregation selects the actor loss reduction. Main VDRA is
  # `global_segment_mean` (PLAN.md P0.1):
  #
  #     L = (1/N_T) * sum_T (1/N_seg(T)) * sum_s L_s^r,
  #
  # where the within-segment reduction ``r`` is set by
  # `segment_token_reduction` below. The main path REQUIRES the actor loss
  # `vdra_segment_mean_ppo` and the row tensors produced by
  # ``tree_data.edges_to_dataproto`` (``segment_objective_weights``,
  # ``tree_total_segment_count``).
  #
  # Values:
  #   * global_segment_mean  — canonical main-run (PLAN.md P0.1).
  #   * vdra_node_balanced   — legacy parent-balanced ablation. Do NOT use
  #                             for main runs; kept for controlled ablations.
  #   * legacy_token_mean    — SPO baseline / ablation.
  policy_aggregation: global_segment_mean

  # PLAN.md P0.1: within-segment token reduction. Must be exactly `mean` or
  # `sum`. `mean` is the canonical/default main setting; `sum` is a supported
  # first-class ablation of the score-function convention. The two modes
  # share exactly one rollout / advantage / segment-denominator / replay /
  # batching path — only the per-row `L_s` differs.
  segment_token_reduction: mean

  # If true (canonical), root-generated child segments participate in the
  # tree average as segments in their own right — every realized segment is
  # counted.
  include_root_parent_group: true

  # Strict main runs must abort on any group integrity failure.
  strict_group_integrity: true

# --- overrides on the verl base ---------------------------------------------
algorithm:

  # Advantage is computed entirely inside the tree rollout, so verl's own
  # estimator is bypassed by RayGearTreeTrainer. P0.9: this used to be `gae`
  # which caused verl.trainer.ppo.utils.need_critic() to return True and
  # spawn an unused critic worker; switch to `grpo` (a critic-free estimator)
  # so no critic worker is created. The actual advantage numbers come from
  # tree_advantage.extract_edges_from_tree and are not affected by this
  # choice — this field only gates VERL's own advantage path and worker set.
  adv_estimator: grpo

  # KL coefficient = 0 by default (no KL in reward).
  use_kl_in_reward: false

  kl_ctrl:

    kl_coef: 0.0

critic:
  # P0.9: RayGearTreeTrainer never trains a critic — advantages come from the
  # tree rollout. Explicitly disable so verl.trainer.ppo.utils.need_critic()
  # returns False regardless of adv_estimator, and no CriticWorker is created
  # in the Ray placement group.
  enable: false

actor_rollout_ref:

  actor:

    # PLAN.md P0.1 / P0.4: main VDRA runs use the segment-average loss.
    # Values:
    #   * vdra_segment_mean_ppo   — main VDRA (default). Uses
    #                                tree_policy.segment_token_reduction to
    #                                pick mean|sum within a segment.
    #   * vdra_node_balanced_ppo  — legacy parent-balanced ablation.
    #   * treetune_ppo            — SPO baseline / ablation.
    policy_loss:

      loss_mode: vdra_segment_mean_ppo

      # PLAN.md P0.1: the same key must be visible on `actor.policy_loss`
      # because the loss function reads it via `config` (ActorConfig). Keep it
      # in sync with `tree_policy.segment_token_reduction`.
      segment_token_reduction: mean

    # No KL-in-loss by default (matches tree-family configs). KL coef = 0.
    use_kl_loss: false

    kl_loss_coef: 0.0

    entropy_coeff: 0.0

    clip_ratio: 0.2

    # PLAN.md P0.3: canonical global optimizer batch size. With
    # target_edges_per_iteration=512 this produces 512/128 = 4 optimizer
    # steps per rollout iteration.
    ppo_mini_batch_size: 128

    ppo_epochs: 1

  rollout:

    name: vllm

    # Async server + agent-loop (verl>=0.7). Tree segments are generated by the
    # gear_tree_agent via repeated server_manager.generate calls.
    mode: async

    # Per-token logprobs needed by the GEAR gate.
    calculate_log_probs: true

    agent:

      # The registered TreeAgentLoop that builds the SPO/GEAR tree per prompt.
      default_agent_loop: gear_tree_agent

      # Maps gear_tree_agent -> recipe.gear_tree.async_tree_rollout.TreeAgentLoop
      # so the agent-loop workers can instantiate it by fqdn.
      agent_loop_config_path: recipe/gear_tree/config/agent_loop.yaml

# Validation grading uses the vendored MATH grader.
custom_reward_function:

  path: recipe/gear_tree/reward.py

  name: compute_gear_math_score

reward_model:

  reward_manager: gear_math
