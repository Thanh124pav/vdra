# PLAN.md P0.6 / P0.7 Smoke D — Full VDRA (main canonical run).
#
# Matrix cell:
#   allocation                  = VDRA
#   policy_aggregation          = segment_mean (paper canonical, PLAN.md §1.3)
#   segment_token_reduction     = mean  (canonical / default)
#   pilot_execution_mode        = fresh_iid
#
# Acceptance (per PLAN.md P0.6):
#   * at least five successful actor updates;
#   * finite loss & gradients;
#   * edge-level replay held every update;
#   * exact segment-count normalization (sum_q n_q == N_seg(T));
#   * rollout / scorer weights verified;
#   * stored old log probabilities used;
#   * no silent truncation;
#   * mixed-depth flushes legal;
#   * feasible budget accounting;
#   * exact fresh_iid final-child accounting;
#   * valid manifest (RunManifest.is_valid_main_run() true).
#
# PLAN.md §1.2: advantages are computed from the complete sibling set
# before filtering. `only_adv_greater_than_zero: true` means sparse TENSOR
# EXECUTION only — exact-zero segments become metadata-only logical slots
# that stay in reservation, caps, divisibility and the M_B/T_B
# denominators; they are never removed from the objective.

tree_policy:
  advantage_mode: spo_local
  policy_aggregation: segment_mean
  segment_token_reduction: mean
  include_root_parent_group: true
  strict_group_integrity: true

gear_tree:
  only_adv_greater_than_zero: true
  gear:
    enabled: true
    strict_vdra: true
    k_algorithm: budget_allocation
    allocation_runtime: online_timeout
    allocation_scope: per_queue_flush_within_tree
    pilot_execution_mode: fresh_iid
    bound_form: linear
    tail_mode: none
    eps_tail: 0.0
  tree_update_mode: spo

actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: vdra_segment_mean_ppo
      segment_token_reduction: mean
