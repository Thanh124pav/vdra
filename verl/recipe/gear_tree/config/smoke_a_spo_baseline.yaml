# PLAN.md §8 Smoke A — SPO / legacy baseline.
#
# Layer this over gear_tree_trainer.yaml when launching:
#   python -m recipe.gear_tree.main_gear_tree \
#     --config-path recipe/gear_tree/config \
#     --config-name gear_tree_trainer \
#     +overlay=smoke_a_spo_baseline \
#     actor_rollout_ref.model.path=... data.train_files=... data.val_files=...
#
# Matrix cell:
#   allocation          = fixed / uniform
#   policy_aggregation  = legacy_token_mean
#
# Acceptance (per PLAN.md §8 Smoke A):
#   * at least two successful actor updates;
#   * finite losses.

tree_policy:
  advantage_mode: spo_local
  policy_aggregation: legacy_token_mean
  include_root_parent_group: true
  strict_group_integrity: false

gear_tree:
  # Fixed / uniform allocation: disable the VDRA online gate entirely so
  # every parent expands with the default branch factor.
  gear:
    enabled: false
    strict_vdra: false
    k_algorithm: simple
    allocation_runtime: online_timeout
    pilot_execution_mode: fresh_iid
  tree_update_mode: spo

actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: treetune_ppo
