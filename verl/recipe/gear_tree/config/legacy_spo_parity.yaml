# Legacy SPO-parity protocol overlay for controlled tree-family comparisons.
# Use with gear_tree_trainer.yaml and keep model/data/eval overrides explicit.

gear_tree:
  tree_shape: [6, 6, 6]
  segment_length: 600
  replay_buffer:
    enabled: true
    target_edges_per_update: 512
    max_edges_per_question: 32
    max_edge_age: 8
    underfill_policy: use_available
    underfilled_update_policy: postpone_until_divisible
    sampling_seed: 0
    checkpoint: true

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 128
    ppo_epochs: 1
