name: CPU CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PLAN.md §6.3 requires a CPU CI workflow that runs the CPU-safe behavioral
# tests (§6.1) on every push/PR. GPU smoke tests (§6.2) are recorded manually
# — this workflow deliberately excludes any test that pulls in a GPU stack.

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-safe dependencies
        run: |
          python -m pip install --upgrade pip
          # Minimal test toolchain — vdra_core and treetune.gear are dep-free
          # Python. The gate/trainer tests importorskip when verl or transformers
          # are missing, so we do NOT install the full verl stack here.
          pip install pytest numpy sortedcontainers httpx pyyaml
          # OmegaConf + Hydra: needed by RayGearTreeTrainer._gear_tree_config
          # and by the PLAN.md P0.1 config-wiring tests.
          pip install omegaconf hydra-core
          # PLAN.md P0.7: recipe.gear_tree tests exercise policy loss +
          # tree data helpers that live under verl/. Install the CPU torch
          # wheel and the small set of gear-tree deps so the correctness
          # tests can run in CI as well.
          # ``ray`` is imported at ``verl/__init__.py`` load time (via
          # ``verl.protocol``), so ``from verl import DataProto`` — used by
          # every gear_tree tree_data / policy_loss test — fails to collect
          # without it. Install ``ray[default]==2.35.*`` to keep the CPU
          # image lean; the tests never call into ray runtime.
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          # PLAN.md P0.8: verl.utils.model imports AutoModelForVision2Seq
          # which was removed in transformers 5.x. Pin to the 4.x line the
          # worker configs were written against, otherwise the pre-GPU gate's
          # real dataclass instantiation step fails on import.
          pip install tensordict "transformers>=4.40,<5.0" codetiming pylatexenc
          pip install "ray>=2.35,<2.40"

      - name: Install the local package
        run: pip install -e .

      - name: Compileall vdra_core and gear_tree
        env:
          PYTHONPATH: ${{ github.workspace }}/verl
        run: |
          python -m compileall vdra_core verl/recipe/gear_tree

      - name: Run CPU behavioral tests (root)
        env:
          # PLAN.md P0.2/P0.5: recipe.gear_tree sits under verl/ and is
          # imported as `from recipe.gear_tree...`; add the verl root so
          # importorskip can find it when verl itself isn't installed.
          PYTHONPATH: ${{ github.workspace }}/verl
        run: |
          # Deliberately skip the vLLM-server / launch-script tests which
          # need external processes, and the math-competition eval which
          # downloads assets. Section 6.1 behavioral coverage is the CPU CI
          # scope.
          #
          # The `treetune.*` package __init__ chain pulls in the full training
          # stack (accelerate, wandb, base58, datasets, jsonnet, requests,
          # overrides, …). Tests that import from `treetune` at module top level
          # therefore cannot collect under the minimal CPU toolchain — they
          # belong to the GPU/full-stack suite recorded manually per §6.2.
          python -m pytest tests/ -q \
            --ignore=tests/test_math_competition_evaluation.py \
            --ignore=tests/test_vllm_launch_scripts.py \
            --ignore=tests/test_vllm_scorer.py \
            --ignore=tests/test_vllm_server.py \
            --ignore=tests/test_gear_algorithm_variants.py \
            --ignore=tests/test_gear_finalization.py \
            --ignore=tests/test_efficient_iid_expander.py \
            --ignore=tests/test_guidance_gen_logprobs.py \
            --ignore=tests/test_max_model_len_config.py \
            --ignore=tests/test_model_override_render.py \
            --ignore=tests/test_online_gear.py \
            --ignore=tests/test_tree_update_config.py \
            --ignore=tests/test_tree_update_modes.py

      - name: Run gear_tree recipe correctness tests (PLAN.md P0.1-P0.8)
        env:
          PYTHONPATH: ${{ github.workspace }}/verl
        run: |
          # trainer_contracts and vendor_parity pull the full verl / ray /
          # torchdata / wandb stack; they belong to the GPU/full-stack suite.
          python -m pytest verl/recipe/gear_tree/tests/ -q \
            --ignore=verl/recipe/gear_tree/tests/test_trainer_contracts.py \
            --ignore=verl/recipe/gear_tree/tests/test_vendor_parity.py

      - name: Pre-GPU gate (PLAN.md P0.8)
        env:
          PYTHONPATH: ${{ github.workspace }}/verl
        run: |
          # PLAN.md P0.8: the pre-GPU gate runs Hydra-free config assertions,
          # real dataclass instantiation for PolicyLossConfig/ActorConfig,
          # and the new P0.1-P0.7 acceptance tests (auto per-question cap,
          # 512/128 = 4 optimizer steps, batch-slot N_B normalization,
          # zero-advantage dense/sparse parity, distributed grad scaling,
          # scorer topology contract, and the manifest lifecycle). Prints
          # exactly PRE_GPU_CHECK=PASS on success; any failure exits non-zero
          # and CI must observe the PASS line before an experiment launches.
          bash scripts/pre_gpu_check.sh
